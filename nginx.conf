server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Astro generates directories with index.html for clean URLs
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Long cache for hashed assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache media assets
    location /media/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Redirects from WordPress legacy URLs
    rewrite ^/home$ / permanent;
    rewrite ^/sample-page$ / permanent;
    rewrite ^/about$ /about-us permanent;
    rewrite ^/programs$ /programs-services permanent;
    rewrite ^/impact$ /annual-reports-impact permanent;
    rewrite ^/blog$ /blog-news-stories permanent;
    rewrite ^/media$ /media-gallery permanent;
    rewrite ^/contact$ /contact-us permanent;

    # Custom 404
    error_page 404 /404.html;
}
